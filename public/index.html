<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sealagom NAVAREA</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 16px; }
    .meta { opacity: .8; margin-bottom: 10px; }
    iframe { width: 100%; height: 80vh; border: 1px solid #ddd; border-radius: 8px; }
    code { background: #f5f5f5; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Sealagom NAVAREA</h1>
  <div class="meta" id="meta">lade…</div>

  <iframe id="frame" src="./api/html"></iframe>

  <script>
    async function load() {
      try {
        const res = await fetch('./api/status');
        const st = await res.json();
        const meta = document.getElementById('meta');
        meta.textContent = `NAVAREA ${st.navarea || '?'} | total=${st.totalCount || 0} | new=${st.newCount || 0} | last=${st.ts || '-'}${st.error ? ' | ERROR: ' + st.error : ''}`;
      } catch (e) {
        document.getElementById('meta').textContent = 'status error: ' + e;
      }
    }
    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
